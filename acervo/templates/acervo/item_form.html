<!-- acervo/templates/acervo/item_form.html -->

{% extends 'acervo/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4>{% if item %}✏️ Editar{% else %}➕ Adicionar{% endif %} Item</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">Título *</label>
                        <input type="text" name="titulo" class="form-control" 
                               value="{{ item.titulo|default:'' }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Autor</label>
                        <input type="text" name="autor" class="form-control" 
                               value="{{ item.autor|default:'' }}" 
                               placeholder="Deixe vazio para 'Anônimo'">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Ano *</label>
                        <input type="number" name="ano" class="form-control" 
                               value="{{ item.ano|default:'' }}" required>
                        <small class="text-muted">Use anos negativos para a.C. (ex: -800)</small>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Tipo *</label>
                        <select name="tipo" class="form-select" required>
                            <option value="">Selecione...</option>
                            <option value="livro" {% if item.tipo == 'livro' %}selected{% endif %}>Livro</option>
                            <option value="revista" {% if item.tipo == 'revista' %}selected{% endif %}>Revista</option>
                            <option value="manuscrito" {% if item.tipo == 'manuscrito' %}selected{% endif %}>Manuscrito</option>
                            <option value="artigo" {% if item.tipo == 'artigo' %}selected{% endif %}>Artigo</option>
                            <option value="outro" {% if item.tipo == 'outro' %}selected{% endif %}>Outro</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Categoria</label>
                        <select name="categoria" class="form-select">
                            <option value="">Sem categoria</option>
                            {% for cat in categorias %}
                                <option value="{{ cat.id }}" 
                                        {% if item.categoria_id == cat.id %}selected{% endif %}>
                                    {{ cat.nome }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">💾 Salvar</button>
                        <a href="{% url 'item_list' %}" class="btn btn-secondary">❌ Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
