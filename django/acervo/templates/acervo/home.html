{% load static %} <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Collection - Acervo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
    body { background-color: #FCD9A2; }
    .hero-section { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .logo-img { max-width: 150px; margin-bottom: 0px; }

    .texto-acervo {
        color: #A37036 !important;
    }

        .btn-custom {
        background-color: #A37036;
        border-color: #A37036;
        color: white;
    }
    .btn-custom:hover {
        background-color: #8a5e2d;
        border-color: #8a5e2d;
        color: white;
    }
    </style>
</head>
<body>

    <div class="container hero-section">
        <div class="text-center p-5 shadow bg-white rounded-4" style="max-width: 600px;">
            
            <img src="{% static 'imagens/logo.png' %}" alt="Logo Acervo" class="logo-img">

            <h1 class="display-5 fw-bold texto-acervo mb-3">Library Collection</h1>

            <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
                <a href="{% url 'login' %}" class="btn btn-custom btn-lg px-4 gap-3">Entrar</a>
                <a href="{% url 'registro' %}" class="btn btn-outline-secondary btn-lg px-4">Criar Conta</a>
            </div>

            <div class="mt-4 pt-3 border-top">
                <a href="{% url 'item_list' %}" class="text-decoration-none fw-semibold text-dark">
                    🔍 Explorar Acervo como Visitante
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
