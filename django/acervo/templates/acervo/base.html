<!-- acervo/templates/acervo/base.html -->

<!DOCTYPE html>
<html lang="pt-br">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Collection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Single:wght@100..900&family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Lobster+Two:ital,wght@0,400;0,700;1,400;1,700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>
            body {
        background-color: #fbe4cc;
    }
        .badge-prelancamento { background-color: #17a2b8; }
        .badge-classico { background-color: #28a745; }
        .badge-anonimo { background-color: #6c757d; }

        body {
        background-color: #fbe4cc;
        font-family: 'Roboto', sans-serif;
    }  

    .badge-prelancamento { background-color: #17a2b8; }
    .badge-classico { background-color: #28a745; }
    .badge-anonimo { background-color: #6c757d; }

    @font-face {
    font-family: 'Luckybones-Bold';
    src: url("{% static 'fonts/Luckybones-Bold.ttf' %}") format('truetype');
    }

    .navbar-brand {
    font-family: 'Luckybones-Bold', sans-serif;
    }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background-color:#A37036;">
        <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="{% url 'item_list' %}">
            <img src="{% static 'imagens/logo.png' %}" alt="Library" height="100" class="me-2">
            Library Collection
        </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'item_list' %}">Itens</a>
                <a class="nav-link" href="{% url 'categoria_list' %}">Categorias</a>
                <a class="nav-link" href="/admin">Admin</a>
            </div>
        </div>
    </nav>
    
    <div class="container mt-4">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
        
        {% block content %}
        {% endblock %}
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
