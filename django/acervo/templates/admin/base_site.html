{% extends "admin/base.html" %}
{% load static %}

{% block extrastyle %}

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{% static 'css/admin.css' %}">
    
    <style>
        @font-face {
            font-family: 'DR-Exclusive';
            src: url("{% static 'fonts/DR Exclusive Editorial.ttf' %}") format('truetype');

        .dashboard #content { display: block !important; }

{% endblock %}

{% block branding %}
    <h1 id="site-name" style="font-family: 'DR-Exclusive', serif;">
        <a href="{% url 'admin:index' %}" class="text-white text-decoration-none">
            Library Collection - Admin
        </a>

{% endblock %}
