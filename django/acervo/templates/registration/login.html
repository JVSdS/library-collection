{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - Library Collection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #FCD9A2; }
        .texto-acervo { color: #A37036 !important; }
        .btn-custom { background-color: #A37036; border-color: #A37036; color: white; }
        .btn-custom:hover { background-color: #8a5e2d; color: white; }
        .card-login { max-width: 400px; width: 100%; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

    <div class="card shadow-sm p-4 card-login bg-white rounded-4">
        <div class="text-center mb-4">
            <h2 class="fw-bold texto-acervo">Login</h2>
            <p class="text-muted">Acesse seu acervo pessoal</p>
        </div>

        {% if form.errors %}
            <div class="alert alert-danger alert-dismissible fade show" role="alert">
                Usuário ou senha incorretos. Tente novamente.
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            
            <div class="mb-3">
                <label for="id_username" class="form-label">Usuário</label>
                <input type="text" name="username" id="id_username" class="form-control" required>
            </div>

            <div class="mb-4">
                <label for="id_password" class="form-label">Senha</label>
                <input type="password" name="password" id="id_password" class="form-control" required>
            </div>

            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-custom btn-lg">Entrar</button>
                <a href="{% url 'home' %}" class="btn btn-link text-decoration-none text-secondary">Voltar ao Início</a>
            </div>
        </form>

        <div class="text-center mt-4">
            <p class="small">Ainda não tem conta? <a href="{% url 'registro' %}" class="texto-acervo fw-bold text-decoration-none">Cadastre-se aqui</a></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
